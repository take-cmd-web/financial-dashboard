<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>マネーサプライ M2 モニター</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Lora:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>

<style>
:root {
  --bg:      #faf9f5;
  --surface: #f0ede6;
  --border:  #e8e6dc;
  --accent:  #d97757;
  --accent2: #6a9bcc;
  --accent3: #788c5d;
  --text:    #141413;
  --muted:   #b0aea5;
  --radius:  8px;

  /* チャート用カラーパレット（16銘柄＋Global） */
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Lora', Georgia, serif;
  font-size: 14px;
  line-height: 1.6;
  min-height: 100vh;
}

/* ── ヘッダー ── */
.header {
  padding: 32px 24px 0;
  max-width: 1400px;
  margin: 0 auto;
}
.header-top {
  display: flex;
  align-items: baseline;
  gap: 12px;
  flex-wrap: wrap;
}
.page-title {
  font-family: 'Poppins', sans-serif;
  font-size: clamp(20px, 3vw, 28px);
  font-weight: 700;
  color: var(--text);
  letter-spacing: -0.5px;
}
.page-subtitle {
  font-family: 'Lora', serif;
  font-style: italic;
  color: var(--muted);
  font-size: 13px;
}
.last-updated {
  font-family: 'Lora', serif;
  font-size: 12px;
  color: var(--muted);
  margin-top: 4px;
}

/* ── メインコンテナ ── */
.main {
  max-width: 1400px;
  margin: 0 auto;
  padding: 20px 24px 48px;
}

/* ── セクション共通 ── */
.section {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
  margin-bottom: 20px;
}
.section-title {
  font-family: 'Poppins', sans-serif;
  font-size: 13px;
  font-weight: 600;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.8px;
  margin-bottom: 14px;
}

/* ── 期間ボタン ── */
.period-btns {
  display: flex;
  gap: 4px;
  flex-wrap: wrap;
}
.period-btn {
  font-family: 'Poppins', sans-serif;
  font-size: 11px;
  font-weight: 600;
  padding: 4px 10px;
  border: 1px solid var(--border);
  border-radius: 4px;
  background: var(--bg);
  color: var(--muted);
  cursor: pointer;
  transition: all 0.15s;
}
.period-btn:hover { border-color: var(--accent); color: var(--accent); }
.period-btn.active {
  background: var(--accent);
  border-color: var(--accent);
  color: #fff;
}

/* ── トップチャート ── */
.top-chart-wrap {
  display: flex;
  gap: 16px;
  align-items: flex-start;
  flex-wrap: wrap;
}
.top-chart-controls {
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 10px;
  margin-bottom: 14px;
}
.chart-canvas-wrap {
  position: relative;
  width: 100%;
  height: 360px;
}

/* ── 表 ── */
.data-table {
  width: 100%;
  border-collapse: collapse;
}
.data-table th {
  font-family: 'Poppins', sans-serif;
  font-size: 11px;
  font-weight: 600;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.6px;
  padding: 8px 12px;
  border-bottom: 1px solid var(--border);
  text-align: left;
  white-space: nowrap;
}
.data-table th.num { text-align: right; }
.data-table td {
  padding: 9px 12px;
  border-bottom: 1px solid var(--border);
  font-size: 13px;
  vertical-align: middle;
}
.data-table tr:last-child td { border-bottom: none; }
.data-table tr:hover td { background: rgba(0,0,0,0.02); }
.data-table tr.row-hidden td { opacity: 0.4; }

.country-cell {
  display: flex;
  align-items: center;
  gap: 10px;
}
.dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  flex-shrink: 0;
}
.ticker-badge {
  font-family: 'Poppins', sans-serif;
  font-size: 10px;
  font-weight: 600;
  color: var(--muted);
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 3px;
  padding: 1px 5px;
  letter-spacing: 0.4px;
}
.val-cell {
  font-family: 'Poppins', sans-serif;
  font-size: 13px;
  font-weight: 500;
  text-align: right;
}
.val-cell .unit {
  font-size: 10px;
  color: var(--muted);
  margin-left: 2px;
}
.date-cell {
  font-family: 'Poppins', sans-serif;
  font-size: 12px;
  color: var(--muted);
  text-align: right;
}
.change-cell {
  font-family: 'Poppins', sans-serif;
  font-size: 12px;
  font-weight: 500;
  text-align: right;
}
.change-pos { color: var(--accent3); }
.change-neg { color: #e05252; }

/* チェックボックス */
.cb-cell { text-align: center; }
.cb-wrap {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 18px;
  height: 18px;
  border: 1.5px solid var(--border);
  border-radius: 3px;
  cursor: pointer;
  transition: all 0.15s;
  background: var(--bg);
}
.cb-wrap.checked {
  background: var(--accent);
  border-color: var(--accent);
}
.cb-wrap svg { display: none; }
.cb-wrap.checked svg { display: block; }

/* ── 個別チャートグリッド ── */
.charts-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 16px;
}
@media (max-width: 768px) {
  .charts-grid { grid-template-columns: 1fr; }
}
.chart-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
}
.chart-card-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 10px;
  flex-wrap: wrap;
  gap: 8px;
}
.chart-card-title {
  display: flex;
  align-items: center;
  gap: 8px;
}
.chart-card-title .dot { width: 9px; height: 9px; }
.chart-card-name {
  font-family: 'Poppins', sans-serif;
  font-size: 13px;
  font-weight: 600;
  color: var(--text);
}
.chart-card-ticker {
  font-family: 'Poppins', sans-serif;
  font-size: 10px;
  color: var(--muted);
}
.chart-card-val {
  font-family: 'Poppins', sans-serif;
  font-size: 13px;
  font-weight: 600;
  color: var(--text);
  text-align: right;
}
.chart-card-val .sub {
  font-size: 11px;
  color: var(--muted);
  font-weight: 400;
}
.card-canvas-wrap {
  position: relative;
  width: 100%;
  height: 180px;
}

/* ── フッター ── */
.footer {
  text-align: center;
  padding: 20px 24px;
  font-family: 'Lora', serif;
  font-size: 12px;
  color: var(--muted);
  border-top: 1px solid var(--border);
  max-width: 1400px;
  margin: 0 auto;
}

/* ── ローディング ── */
.loading {
  display: flex;
  align-items: center;
  justify-content: center;
  height: 200px;
  color: var(--muted);
  font-family: 'Poppins', sans-serif;
  font-size: 13px;
  gap: 8px;
}
.spinner {
  width: 16px; height: 16px;
  border: 2px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── エラー ── */
.error-msg {
  text-align: center;
  padding: 40px;
  color: var(--muted);
  font-family: 'Lora', serif;
  font-style: italic;
}

/* スマホ対応 */
@media (max-width: 600px) {
  .main { padding: 16px 12px 40px; }
  .header { padding: 20px 12px 0; }
  .data-table th, .data-table td { padding: 7px 8px; }
  .chart-canvas-wrap { height: 260px; }
}
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <h1 class="page-title">マネーサプライ M2 モニター</h1>
    <span class="page-subtitle">Global Money Supply</span>
  </div>
  <p class="last-updated" id="lastUpdated">データ読み込み中…</p>
</div>

<div class="main">

  <!-- ── トップ：比較チャート ── -->
  <div class="section" id="topSection">
    <div class="top-chart-controls">
      <div class="section-title" style="margin-bottom:0">主要9カ国 積み上げ＋合計（USD換算）</div>
      <div class="period-btns" id="topPeriodBtns">
        <button class="period-btn" data-p="1y">1年</button>
        <button class="period-btn" data-p="5y">5年</button>
        <button class="period-btn active" data-p="10y">10年</button>
        <button class="period-btn" data-p="all">すべて</button>
      </div>
    </div>
    <div class="chart-canvas-wrap">
      <div class="loading" id="topLoading"><div class="spinner"></div>データを読み込んでいます</div>
      <canvas id="topChart" style="display:none"></canvas>
    </div>
  </div>

  <!-- ── 表 ── -->
  <div class="section" id="tableSection" style="display:none">
    <div class="section-title">直近の値（月次）</div>
    <div style="overflow-x:auto">
      <table class="data-table" id="dataTable">
        <thead>
          <tr>
            <th>国 / 地域</th>
            <th class="num">直近 (USD)</th>
            <th class="num">前回 (USD)</th>
            <th class="num">変化</th>
            <th class="cb-cell">表示</th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>
  </div>

  <!-- ── 個別チャートグリッド ── -->
  <div id="chartsGrid" class="charts-grid" style="display:none"></div>

</div>

<div class="footer">
  出典：TradingView (ECONOMICS) &nbsp;|&nbsp; データ更新：毎月自動取得 &nbsp;|&nbsp; 単位：USD換算（兆ドル）
</div>

<script>
// ══════════════════════════════════════════════════════════
//  設定
// ══════════════════════════════════════════════════════════
const DATA_URL = 'data_money_supply.json';

// 為替レート（各通貨→USD）: 月次取得が理想だが、ここでは代表レートをハードコード
// 実際のデータは各国通貨建てのため、USD換算に使用
// ※ EUM2はすでにEUR建て（ECBデータ）なのでEURUSDを掛ける
// ※ USM2はUSD建てなのでレート=1
// ※ CNM2はCNY建てなのでCNYUSDを掛ける
// これらは概算値。精度を上げるには別途FX系列を取得する必要がある。
// data_money_supply.jsonにfx_ratesフィールドがあれば優先使用する。

// フォールバック用の固定レート（2024年末頃の概算）
const FX_FALLBACK = {
  USD: 1,
  CNY: 0.1385,
  EUR: 1.105,
  JPY: 0.00667,
  GBP: 1.27,
  KRW: 0.000735,
  CAD: 0.738,
  RUB: 0.01095,
  BRL: 0.172,
  MXN: 0.0495,
  INR: 0.01195,
  SAR: 0.2666,
  IDR: 0.0000623,
  TRY: 0.02857,
  ZAR: 0.0535,
  ARS: 0.00098,
};

const TICKERS_INFO = [
  { ticker:'CNM2', label:'中国',   currency:'CNY' },
  { ticker:'USM2', label:'米国',   currency:'USD' },
  { ticker:'EUM2', label:'EU',     currency:'EUR' },
  { ticker:'JPM2', label:'日本',   currency:'JPY' },
  { ticker:'GBM2', label:'英国',   currency:'GBP' },
  { ticker:'CAM2', label:'カナダ', currency:'CAD' },
  { ticker:'KRM2', label:'韓国',   currency:'KRW' },
  { ticker:'RUM2', label:'ロシア', currency:'RUB' },
  { ticker:'BRM2', label:'ブラジル', currency:'BRL' },
];

// トップチャートの積み上げ対象（全9カ国）
const STACK_TICKERS = ['CNM2','USM2','EUM2','JPM2','GBM2','CAM2','KRM2','RUM2','BRM2'];

// チャートカラー（9カ国＋合計）
const COLORS = [
  '#d97757', // 合計
  '#e05252', // CNM2 中国
  '#6a9bcc', // USM2 米国
  '#f5a623', // EUM2 EU
  '#788c5d', // JPM2 日本
  '#1abc9c', // GBM2 英国
  '#9b59b6', // CAM2 カナダ
  '#3498db', // KRM2 韓国
  '#c0392b', // RUM2 ロシア
  '#27ae60', // BRM2 ブラジル
];
const GLOBAL_COLOR = '#d97757';

// 積み上げ用カラー（全9カ国）
const STACK_COLORS = {
  CNM2: '#e05252',
  USM2: '#6a9bcc',
  EUM2: '#f5a623',
  JPM2: '#788c5d',
  GBM2: '#1abc9c',
  CAM2: '#9b59b6',
  KRM2: '#3498db',
  RUM2: '#c0392b',
  BRM2: '#27ae60',
};

// ══════════════════════════════════════════════════════════
//  状態
// ══════════════════════════════════════════════════════════
let rawData    = null;
let seriesData = {};     // ticker → [{x: Date, y: number}] (各国通貨建て)
let seriesUSD  = {};     // ticker → [{x: Date, y: number}] (USD換算済み)
let fxRates    = {};     // currency → USD rate
let visibility = {};
let topPeriod  = '10y';
let cardPeriod = {};
let topChartInst = null;
let cardCharts   = {};

// ══════════════════════════════════════════════════════════
//  ユーティリティ
// ══════════════════════════════════════════════════════════
function periodToDate(p) {
  const now = new Date();
  if (p === '1y')  return new Date(now.getFullYear()-1,  now.getMonth(), 1);
  if (p === '5y')  return new Date(now.getFullYear()-5,  now.getMonth(), 1);
  if (p === '10y') return new Date(now.getFullYear()-10, now.getMonth(), 1);
  return new Date('2000-01-01');
}

function formatT(v) {
  if (v == null || isNaN(v)) return '—';
  if (Math.abs(v) >= 1e12) return (v/1e12).toFixed(2) + 'T';
  if (Math.abs(v) >= 1e9)  return (v/1e9).toFixed(1)  + 'B';
  return v.toFixed(0);
}

function formatDate(dateStr) {
  if (!dateStr) return '—';
  const d = new Date(dateStr);
  return d.getFullYear() + '年' + String(d.getMonth()+1).padStart(2,'0') + '月';
}

// ══════════════════════════════════════════════════════════
//  データ処理
// ══════════════════════════════════════════════════════════
function processData(json) {
  // FXレート決定：JSONにfx_ratesがあれば使用、なければフォールバック
  const storedFX = json.meta?.fx_rates || {};
  TICKERS_INFO.forEach(info => {
    fxRates[info.currency] = storedFX[info.currency] ?? FX_FALLBACK[info.currency] ?? 1;
  });

  const series = json.series || {};

  TICKERS_INFO.forEach(info => {
    const raw = series[info.ticker] || [];
    const fx  = fxRates[info.currency] || 1;
    seriesData[info.ticker] = raw.map(([d,v]) => ({
      x: new Date(d), y: v
    })).sort((a,b) => a.x - b.x);

    // USD換算済みシリーズ
    seriesUSD[info.ticker] = seriesData[info.ticker].map(pt => ({
      x: pt.x, y: pt.y * fx
    }));

    visibility[info.ticker] = true;
  });

  // 合計 = 全銘柄のUSD換算合計（forward fill: データ欠損月は直前値を使用）
  // 月キーをYYYY-MM形式で統一（ローカル時刻基準でずれないよう文字列から生成）
  function toMonthKey(dateOrStr) {
    if (typeof dateOrStr === 'string') return dateOrStr.slice(0,7);
    const d = dateOrStr;
    return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0');
  }

  // 各銘柄の月→値マップを先に作成（O(n)）
  const tickerMonthMap = {};
  TICKERS_INFO.forEach(info => {
    tickerMonthMap[info.ticker] = {};
    seriesUSD[info.ticker].forEach(pt => {
      tickerMonthMap[info.ticker][toMonthKey(pt.x)] = pt.y;
    });
  });

  // 全月リストを生成してソート
  const allMonths = new Set();
  TICKERS_INFO.forEach(info => {
    Object.keys(tickerMonthMap[info.ticker]).forEach(m => allMonths.add(m));
  });
  const sortedMonths = Array.from(allMonths).sort();

  // forward fill: 各銘柄で欠損月に直前値を補完
  const filledMap = {};
  TICKERS_INFO.forEach(info => {
    filledMap[info.ticker] = {};
    let lastVal = null;
    sortedMonths.forEach(month => {
      const v = tickerMonthMap[info.ticker][month];
      if (v != null) lastVal = v;
      if (lastVal !== null) filledMap[info.ticker][month] = lastVal;
    });
  });

  // 月ごとに合計（8カ国以上揃っている月のみ）
  seriesUSD['GLOBAL'] = sortedMonths
    .map(month => {
      let sum = 0;
      let cnt = 0;
      TICKERS_INFO.forEach(info => {
        const v = filledMap[info.ticker][month];
        if (v != null) { sum += v; cnt++; }
      });
      return { x: new Date(month + '-02'), y: sum, cnt }; // -02で UTC→JST ずれ回避
    })
    .filter(p => p.cnt >= 8)
    .map(p => ({ x: p.x, y: p.y }))
    .sort((a,b) => a.x - b.x);
  seriesData['GLOBAL'] = seriesUSD['GLOBAL'];
  visibility['GLOBAL'] = true;
}

function filterByPeriod(pts, period) {
  const since = periodToDate(period);
  return pts.filter(p => p.x >= since);
}

// ══════════════════════════════════════════════════════════
//  Chart.js 共通オプション
// ══════════════════════════════════════════════════════════
function baseOptions(showLegend = false) {
  return {
    responsive: true,
    maintainAspectRatio: false,
    animation: { duration: 400 },
    interaction: { mode: 'index', intersect: false },
    plugins: {
      legend: {
        display: showLegend,
        position: 'top',
        labels: {
          font: { family: 'Poppins', size: 11 },
          color: '#141413',
          boxWidth: 10, boxHeight: 10, padding: 12,
          usePointStyle: true, pointStyle: 'circle',
        },
      },
      tooltip: {
        backgroundColor: '#faf9f5',
        borderColor: '#e8e6dc',
        borderWidth: 1,
        titleColor: '#141413',
        bodyColor: '#141413',
        titleFont: { family: 'Poppins', size: 12, weight: '600' },
        bodyFont: { family: 'Lora', size: 12 },
        padding: 10,
        callbacks: {
          label: ctx => ` ${ctx.dataset.label}: ${formatT(ctx.parsed.y)} USD`,
        }
      },
    },
    scales: {
      x: {
        type: 'time',
        time: { unit: 'year', tooltipFormat: 'yyyy年MM月' },
        grid: { color: '#e8e6dc', lineWidth: 0.5 },
        ticks: { font: { family: 'Poppins', size: 11 }, color: '#b0aea5', maxTicksLimit: 10 },
        border: { color: '#e8e6dc' },
      },
      y: {
        grid: { color: '#e8e6dc', lineWidth: 0.5 },
        ticks: { font: { family: 'Poppins', size: 11 }, color: '#b0aea5', callback: v => formatT(v) },
        border: { color: '#e8e6dc' },
      },
    },
  };
}

// ══════════════════════════════════════════════════════════
//  トップチャート（積み上げ棒グラフ＋合計折れ線）
// ══════════════════════════════════════════════════════════
function buildTopChart() {
  const canvas = document.getElementById('topChart');
  const ctx    = canvas.getContext('2d');
  const datasets = [];

  // 積み上げ（米国・EU・日本・英国）
  STACK_TICKERS.forEach(t => {
    const info  = TICKERS_INFO.find(i => i.ticker === t);
    const color = STACK_COLORS[t];
    const pts   = filterByPeriod(seriesUSD[t] || [], topPeriod);
    datasets.push({
      type: 'bar',
      label: info?.label || t,
      data: pts,
      backgroundColor: color + 'cc',
      borderColor: color,
      borderWidth: 0,
      stack: 'stack1',
      order: 2,
      barPercentage: 1.0,
      categoryPercentage: 1.0,
    });
  });

  // 合計折れ線
  const gPts = filterByPeriod(seriesUSD['GLOBAL'], topPeriod);
  datasets.push({
    type: 'line',
    label: '合計',
    data: gPts,
    borderColor: GLOBAL_COLOR,
    backgroundColor: 'transparent',
    borderWidth: 2,
    pointRadius: 0,
    pointHoverRadius: 4,
    tension: 0.3,
    order: 1,
  });

  const opts = baseOptions(true);
  opts.scales.x.stacked = true;
  opts.scales.y.stacked = true;
  opts.scales.x.time.unit = 'year';

  if (topChartInst) topChartInst.destroy();
  topChartInst = new Chart(ctx, {
    type: 'bar',
    data: { datasets },
    options: opts,
  });
  canvas.style.display = 'block';
}

function updateTopChart() {
  if (!topChartInst) return;
  STACK_TICKERS.forEach((t, i) => {
    topChartInst.data.datasets[i].data = filterByPeriod(seriesUSD[t] || [], topPeriod);
  });
  topChartInst.data.datasets[STACK_TICKERS.length].data =
    filterByPeriod(seriesUSD['GLOBAL'], topPeriod);
  topChartInst.update();
}

// ══════════════════════════════════════════════════════════
//  表（USD換算値を表示）
// ══════════════════════════════════════════════════════════
function buildTable() {
  const tbody = document.getElementById('tableBody');
  tbody.innerHTML = '';

  // 合計行
  const gPts  = seriesUSD['GLOBAL'];
  const gLast = gPts[gPts.length-1];
  const gPrev = gPts[gPts.length-2];
  tbody.appendChild(makeTableRow('GLOBAL', '合計', '', GLOBAL_COLOR, gLast?.y, gPrev?.y));

  TICKERS_INFO.forEach((info, i) => {
    const pts  = seriesUSD[info.ticker];
    const last = pts[pts.length-1];
    const prev = pts[pts.length-2];
    tbody.appendChild(makeTableRow(info.ticker, info.label, info.ticker, COLORS[i+1], last?.y, prev?.y));
  });

  document.getElementById('tableSection').style.display = 'block';
}

function makeTableRow(ticker, label, tickerBadge, color, latestVal, prevVal) {
  const tr = document.createElement('tr');
  tr.dataset.ticker = ticker;
  if (ticker !== 'GLOBAL' && !visibility[ticker]) tr.classList.add('row-hidden');

  const chg      = (latestVal != null && prevVal != null) ? latestVal - prevVal : null;
  const chgPct   = (chg != null && prevVal) ? (chg/prevVal*100) : null;
  const chgClass = chg == null ? '' : chg >= 0 ? 'change-pos' : 'change-neg';
  const chgStr   = chgPct != null ? (chg >= 0 ? '+' : '') + chgPct.toFixed(1) + '%' : '—';
  const isGlobal = ticker === 'GLOBAL';
  const checked  = isGlobal ? true : visibility[ticker];

  tr.innerHTML = `
    <td>
      <div class="country-cell">
        <div class="dot" style="background:${color}"></div>
        <span>${label}</span>
        ${tickerBadge ? `<span class="ticker-badge">${tickerBadge}</span>` : ''}
      </div>
    </td>
    <td class="val-cell">${formatT(latestVal)}<span class="unit"> USD</span></td>
    <td class="val-cell">${formatT(prevVal)}<span class="unit"> USD</span></td>
    <td class="change-cell ${chgClass}">${chgStr}</td>
    <td class="cb-cell">
      <div class="cb-wrap ${checked ? 'checked' : ''}" data-ticker="${ticker}">
        <svg width="10" height="8" viewBox="0 0 10 8" fill="none">
          <path d="M1 4L3.5 6.5L9 1" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
        </svg>
      </div>
    </td>
  `;

  tr.querySelector('.cb-wrap').addEventListener('click', () => toggleVisibility(ticker));
  return tr;
}

function toggleVisibility(ticker) {
  visibility[ticker] = !visibility[ticker];
  const tr = document.querySelector(`tr[data-ticker="${ticker}"]`);
  if (tr) tr.classList.toggle('row-hidden', !visibility[ticker]);
  const cb = document.querySelector(`.cb-wrap[data-ticker="${ticker}"]`);
  if (cb) cb.classList.toggle('checked', visibility[ticker]);
  const card = document.getElementById('card-' + ticker);
  if (card) card.style.opacity = visibility[ticker] ? '1' : '0.4';

  // トップチャートの該当データセットを表示/非表示
  if (topChartInst) {
    if (ticker === 'GLOBAL') {
      // 合計は最後のデータセット（折れ線）
      const ds = topChartInst.data.datasets[STACK_TICKERS.length];
      if (ds) ds.hidden = !visibility[ticker];
    }
    topChartInst.update();
  }
}

// ══════════════════════════════════════════════════════════
//  個別カードチャート（各国通貨建てのまま）
// ══════════════════════════════════════════════════════════
function buildCardsGrid() {
  const grid = document.getElementById('chartsGrid');
  grid.innerHTML = '';

  grid.appendChild(makeCard('GLOBAL', '合計', '', GLOBAL_COLOR));
  TICKERS_INFO.forEach((info, i) => {
    grid.appendChild(makeCard(info.ticker, info.label, info.ticker, COLORS[i+1]));
  });

  grid.style.display = 'grid';
  requestAnimationFrame(() => {
    renderCard('GLOBAL');
    TICKERS_INFO.forEach(info => renderCard(info.ticker));
  });
}

function makeCard(ticker, label, tickerBadge, color) {
  // カードはUSD換算値を使用
  const pts  = seriesUSD[ticker] || [];
  const last = pts[pts.length-1];
  const prev = pts[pts.length-2];
  const chg  = (last && prev) ? ((last.y - prev.y)/prev.y*100) : null;
  const chgStr = chg != null ? (chg>=0?'+':'') + chg.toFixed(1)+'%' : '';
  const chgCls = chg != null ? (chg>=0?'change-pos':'change-neg') : '';
  const info = TICKERS_INFO.find(t => t.ticker === ticker);
  const currLabel = info ? info.currency : '';

  cardPeriod[ticker] = '10y';

  const div = document.createElement('div');
  div.className = 'chart-card';
  div.id = 'card-' + ticker;
  div.innerHTML = `
    <div class="chart-card-header">
      <div class="chart-card-title">
        <div class="dot" style="background:${color}"></div>
        <div>
          <div class="chart-card-name">${label}</div>
          <div class="chart-card-ticker">${tickerBadge ? tickerBadge + ' · ' : ''}月次</div>
        </div>
      </div>
      <div class="chart-card-val">
        ${formatT(last?.y)}<span class="unit" style="font-size:10px;color:var(--muted)"> USD</span>
        ${chgStr ? `<br><span class="sub ${chgCls}" style="font-size:11px">${chgStr}</span>` : ''}
      </div>
    </div>
    <div class="period-btns" style="margin-bottom:10px">
      <button class="period-btn" data-p="1y"  data-ticker="${ticker}">1年</button>
      <button class="period-btn" data-p="5y"  data-ticker="${ticker}">5年</button>
      <button class="period-btn active" data-p="10y" data-ticker="${ticker}">10年</button>
      <button class="period-btn" data-p="all" data-ticker="${ticker}">すべて</button>
    </div>
    <div class="card-canvas-wrap">
      <canvas id="canvas-${ticker}"></canvas>
    </div>
  `;

  div.querySelectorAll('.period-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      div.querySelectorAll('.period-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      cardPeriod[ticker] = btn.dataset.p;
      renderCard(ticker);
    });
  });

  return div;
}

function renderCard(ticker) {
  const canvas = document.getElementById('canvas-' + ticker);
  if (!canvas) return;

  const isGlobal = ticker === 'GLOBAL';
  const color = isGlobal ? GLOBAL_COLOR : COLORS[TICKERS_INFO.findIndex(t => t.ticker === ticker) + 1];
  const label = isGlobal ? '合計' : TICKERS_INFO.find(t => t.ticker === ticker)?.label || ticker;
  const period = cardPeriod[ticker] || '10y';
  const pts = filterByPeriod(seriesUSD[ticker] || [], period);

  if (cardCharts[ticker]) { cardCharts[ticker].destroy(); delete cardCharts[ticker]; }

  const opts = baseOptions(false);
  opts.plugins.tooltip.callbacks.label = ctx => ` ${label}: ${formatT(ctx.parsed.y)} USD`;
  opts.scales.x.ticks.maxTicksLimit = 6;
  opts.scales.y.ticks.maxTicksLimit = 5;

  cardCharts[ticker] = new Chart(canvas.getContext('2d'), {
    type: 'line',
    data: {
      datasets: [{
        label,
        data: pts,
        borderColor: color,
        backgroundColor: color + '20',
        borderWidth: 2,
        pointRadius: 0,
        pointHoverRadius: 3,
        fill: true,
        tension: 0.4,
      }]
    },
    options: opts,
  });
}

// ══════════════════════════════════════════════════════════
//  トップ期間ボタン
// ══════════════════════════════════════════════════════════
document.getElementById('topPeriodBtns').addEventListener('click', e => {
  const btn = e.target.closest('.period-btn');
  if (!btn) return;
  document.querySelectorAll('#topPeriodBtns .period-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  topPeriod = btn.dataset.p;
  updateTopChart();
});

// ══════════════════════════════════════════════════════════
//  初期化
// ══════════════════════════════════════════════════════════
async function init() {
  try {
    const resp = await fetch(DATA_URL);
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    rawData = await resp.json();
  } catch (e) {
    rawData = generateDemoData();
  }

  processData(rawData);

  const genAt = rawData?.meta?.generated_at;
  document.getElementById('lastUpdated').textContent =
    genAt
      ? '最終更新: ' + new Date(genAt).toLocaleString('ja-JP', {timeZone:'Asia/Tokyo'}) + ' JST'
      : '最終更新: デモデータ（本番では data_money_supply.json を配置してください）';

  document.getElementById('topLoading').style.display = 'none';

  buildTopChart();
  buildTable();
  buildCardsGrid();
}

// ══════════════════════════════════════════════════════════
//  デモデータ生成
// ══════════════════════════════════════════════════════════
function generateDemoData() {
  const series = {};
  // 各国通貨建てのベースライン（実態に近い値）
  const baselines = {
    CNM2: 3.2e12/0.1385,  USM2: 8.5e12,         EUM2: 6.0e12/1.105,
    JPM2: 9.8e12/0.00667, GBM2: 2.8e12/1.27,    CAM2: 1.2e12/0.738,
    KRM2: 1.5e12/0.000735,RUM2: 0.9e12/0.01095, BRM2: 0.8e12/0.172,
  };
  const growth = {
    CNM2:0.12, USM2:0.055, EUM2:0.05, JPM2:0.03,
    GBM2:0.05, CAM2:0.055, KRM2:0.07, RUM2:0.12,
    BRM2:0.13,
  };

  TICKERS_INFO.forEach(info => {
    const records = [];
    const base = baselines[info.ticker] || 1e12;
    const gr   = growth[info.ticker] || 0.07;
    const start = new Date('2008-01-01');
    let val = base * Math.pow(1/(1+gr), 17);
    for (let d = new Date(start); d <= new Date(); d.setMonth(d.getMonth()+1)) {
      val *= (1 + gr/12) * (1 + (Math.random()-0.5)*0.005);
      records.push([d.toISOString().slice(0,10), Math.round(val)]);
    }
    series[info.ticker] = records;
  });

  return {
    meta: {
      generated_at: new Date().toISOString(),
      source: 'デモデータ',
      fx_rates: FX_FALLBACK,
    },
    series,
  };
}

init();
</script>
