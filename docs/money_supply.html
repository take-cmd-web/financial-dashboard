<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>マネーサプライ M2 モニター</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Lora:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>

<style>
:root {
  --bg:      #faf9f5;
  --surface: #f0ede6;
  --border:  #e8e6dc;
  --accent:  #d97757;
  --accent2: #6a9bcc;
  --accent3: #788c5d;
  --text:    #141413;
  --muted:   #b0aea5;
  --radius:  8px;

  /* チャート用カラーパレット（19銘柄＋Global） */
  --c0:  #d97757; /* Global – accent orange */
  --c1:  #e05252; /* CNM2 中国 */
  --c2:  #6a9bcc; /* USM2 米国 */
  --c3:  #f5a623; /* EUM2 欧州 */
  --c4:  #788c5d; /* JPM2 日本 */
  --c5:  #9b59b6; /* DEM2 ドイツ */
  --c6:  #1abc9c; /* GBM2 英国 */
  --c7:  #e74c8b; /* FRM2 フランス */
  --c8:  #3498db; /* KRM2 韓国 */
  --c9:  #e67e22; /* ITM2 イタリア */
  --c10: #2ecc71; /* CAM2 カナダ */
  --c11: #c0392b; /* RUM2 ロシア */
  --c12: #27ae60; /* BRM2 ブラジル */
  --c13: #8e44ad; /* MXM2 メキシコ */
  --c14: #f39c12; /* INM2 インド */
  --c15: #16a085; /* SAM2 サウジ */
  --c16: #d35400; /* IDM2 インドネシア */
  --c17: #c0392b; /* TRM2 トルコ */
  --c18: #7f8c8d; /* ZAM2 南アフリカ */
  --c19: #2980b9; /* ARM2 アルゼンチン */
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Lora', Georgia, serif;
  font-size: 14px;
  line-height: 1.6;
  min-height: 100vh;
}

/* ── ヘッダー ── */
.header {
  padding: 32px 24px 0;
  max-width: 1400px;
  margin: 0 auto;
}
.header-top {
  display: flex;
  align-items: baseline;
  gap: 12px;
  flex-wrap: wrap;
}
.page-title {
  font-family: 'Poppins', sans-serif;
  font-size: clamp(20px, 3vw, 28px);
  font-weight: 700;
  color: var(--text);
  letter-spacing: -0.5px;
}
.page-subtitle {
  font-family: 'Lora', serif;
  font-style: italic;
  color: var(--muted);
  font-size: 13px;
}
.last-updated {
  font-family: 'Lora', serif;
  font-size: 12px;
  color: var(--muted);
  margin-top: 4px;
}

/* ── メインコンテナ ── */
.main {
  max-width: 1400px;
  margin: 0 auto;
  padding: 20px 24px 48px;
}

/* ── セクション共通 ── */
.section {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
  margin-bottom: 20px;
}
.section-title {
  font-family: 'Poppins', sans-serif;
  font-size: 13px;
  font-weight: 600;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.8px;
  margin-bottom: 14px;
}

/* ── 期間ボタン ── */
.period-btns {
  display: flex;
  gap: 4px;
  flex-wrap: wrap;
}
.period-btn {
  font-family: 'Poppins', sans-serif;
  font-size: 11px;
  font-weight: 600;
  padding: 4px 10px;
  border: 1px solid var(--border);
  border-radius: 4px;
  background: var(--bg);
  color: var(--muted);
  cursor: pointer;
  transition: all 0.15s;
}
.period-btn:hover { border-color: var(--accent); color: var(--accent); }
.period-btn.active {
  background: var(--accent);
  border-color: var(--accent);
  color: #fff;
}

/* ── トップチャート ── */
.top-chart-wrap {
  display: flex;
  gap: 16px;
  align-items: flex-start;
  flex-wrap: wrap;
}
.top-chart-controls {
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 10px;
  margin-bottom: 14px;
}
.chart-canvas-wrap {
  position: relative;
  width: 100%;
  height: 360px;
}

/* ── 表 ── */
.data-table {
  width: 100%;
  border-collapse: collapse;
}
.data-table th {
  font-family: 'Poppins', sans-serif;
  font-size: 11px;
  font-weight: 600;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.6px;
  padding: 8px 12px;
  border-bottom: 1px solid var(--border);
  text-align: left;
  white-space: nowrap;
}
.data-table th.num { text-align: right; }
.data-table td {
  padding: 9px 12px;
  border-bottom: 1px solid var(--border);
  font-size: 13px;
  vertical-align: middle;
}
.data-table tr:last-child td { border-bottom: none; }
.data-table tr:hover td { background: rgba(0,0,0,0.02); }
.data-table tr.row-hidden td { opacity: 0.4; }

.country-cell {
  display: flex;
  align-items: center;
  gap: 10px;
}
.dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  flex-shrink: 0;
}
.ticker-badge {
  font-family: 'Poppins', sans-serif;
  font-size: 10px;
  font-weight: 600;
  color: var(--muted);
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 3px;
  padding: 1px 5px;
  letter-spacing: 0.4px;
}
.val-cell {
  font-family: 'Poppins', sans-serif;
  font-size: 13px;
  font-weight: 500;
  text-align: right;
}
.val-cell .unit {
  font-size: 10px;
  color: var(--muted);
  margin-left: 2px;
}
.date-cell {
  font-family: 'Poppins', sans-serif;
  font-size: 12px;
  color: var(--muted);
  text-align: right;
}
.change-cell {
  font-family: 'Poppins', sans-serif;
  font-size: 12px;
  font-weight: 500;
  text-align: right;
}
.change-pos { color: var(--accent3); }
.change-neg { color: #e05252; }

/* チェックボックス */
.cb-cell { text-align: center; }
.cb-wrap {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 18px;
  height: 18px;
  border: 1.5px solid var(--border);
  border-radius: 3px;
  cursor: pointer;
  transition: all 0.15s;
  background: var(--bg);
}
.cb-wrap.checked {
  background: var(--accent);
  border-color: var(--accent);
}
.cb-wrap svg { display: none; }
.cb-wrap.checked svg { display: block; }

/* ── 個別チャートグリッド ── */
.charts-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 16px;
}
@media (max-width: 768px) {
  .charts-grid { grid-template-columns: 1fr; }
}
.chart-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
}
.chart-card-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 10px;
  flex-wrap: wrap;
  gap: 8px;
}
.chart-card-title {
  display: flex;
  align-items: center;
  gap: 8px;
}
.chart-card-title .dot { width: 9px; height: 9px; }
.chart-card-name {
  font-family: 'Poppins', sans-serif;
  font-size: 13px;
  font-weight: 600;
  color: var(--text);
}
.chart-card-ticker {
  font-family: 'Poppins', sans-serif;
  font-size: 10px;
  color: var(--muted);
}
.chart-card-val {
  font-family: 'Poppins', sans-serif;
  font-size: 13px;
  font-weight: 600;
  color: var(--text);
  text-align: right;
}
.chart-card-val .sub {
  font-size: 11px;
  color: var(--muted);
  font-weight: 400;
}
.card-canvas-wrap {
  position: relative;
  width: 100%;
  height: 180px;
}

/* ── フッター ── */
.footer {
  text-align: center;
  padding: 20px 24px;
  font-family: 'Lora', serif;
  font-size: 12px;
  color: var(--muted);
  border-top: 1px solid var(--border);
  max-width: 1400px;
  margin: 0 auto;
}

/* ── ローディング ── */
.loading {
  display: flex;
  align-items: center;
  justify-content: center;
  height: 200px;
  color: var(--muted);
  font-family: 'Poppins', sans-serif;
  font-size: 13px;
  gap: 8px;
}
.spinner {
  width: 16px; height: 16px;
  border: 2px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── エラー ── */
.error-msg {
  text-align: center;
  padding: 40px;
  color: var(--muted);
  font-family: 'Lora', serif;
  font-style: italic;
}

/* スマホ対応 */
@media (max-width: 600px) {
  .main { padding: 16px 12px 40px; }
  .header { padding: 20px 12px 0; }
  .data-table th, .data-table td { padding: 7px 8px; }
  .chart-canvas-wrap { height: 260px; }
}
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <h1 class="page-title">マネーサプライ M2 モニター</h1>
    <span class="page-subtitle">Global Money Supply</span>
  </div>
  <p class="last-updated" id="lastUpdated">データ読み込み中…</p>
</div>

<div class="main">

  <!-- ── トップ：比較チャート ── -->
  <div class="section" id="topSection">
    <div class="top-chart-controls">
      <div class="section-title" style="margin-bottom:0">比較チャート（USD換算）</div>
      <div class="period-btns" id="topPeriodBtns">
        <button class="period-btn" data-p="1y">1年</button>
        <button class="period-btn" data-p="5y">5年</button>
        <button class="period-btn active" data-p="10y">10年</button>
        <button class="period-btn" data-p="all">すべて</button>
      </div>
    </div>
    <div class="chart-canvas-wrap">
      <div class="loading" id="topLoading"><div class="spinner"></div>データを読み込んでいます</div>
      <canvas id="topChart" style="display:none"></canvas>
    </div>
  </div>

  <!-- ── 表 ── -->
  <div class="section" id="tableSection" style="display:none">
    <div class="section-title">直近の値（月次）</div>
    <div style="overflow-x:auto">
      <table class="data-table" id="dataTable">
        <thead>
          <tr>
            <th>国 / 地域</th>
            <th class="num">直近</th>
            <th class="num">前回</th>
            <th class="num">観測期間</th>
            <th class="num">変化</th>
            <th class="num">単位</th>
            <th class="cb-cell">表示</th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>
  </div>

  <!-- ── 個別チャートグリッド ── -->
  <div id="chartsGrid" class="charts-grid" style="display:none"></div>

</div>

<div class="footer">
  出典：TradingView (ECONOMICS) &nbsp;|&nbsp; データ更新：毎月自動取得 &nbsp;|&nbsp; 単位：USD換算（兆ドル）
</div>

<script>
// ══════════════════════════════════════════════════════════
//  設定
// ══════════════════════════════════════════════════════════
const DATA_URL = 'data_money_supply.json';

const TICKERS_INFO = [
  { ticker:'CNM2', label:'中国',         currency:'CNY' },
  { ticker:'USM2', label:'米国',         currency:'USD' },
  { ticker:'EUM2', label:'欧州連合',     currency:'EUR' },
  { ticker:'JPM2', label:'日本',         currency:'JPY' },
  { ticker:'DEM2', label:'ドイツ',       currency:'EUR' },
  { ticker:'GBM2', label:'英国',         currency:'GBP' },
  { ticker:'FRM2', label:'フランス',     currency:'EUR' },
  { ticker:'KRM2', label:'韓国',         currency:'KRW' },
  { ticker:'ITM2', label:'イタリア',     currency:'EUR' },
  { ticker:'CAM2', label:'カナダ',       currency:'CAD' },
  { ticker:'RUM2', label:'ロシア',       currency:'RUB' },
  { ticker:'BRM2', label:'ブラジル',     currency:'BRL' },
  { ticker:'MXM2', label:'メキシコ',     currency:'MXN' },
  { ticker:'INM2', label:'インド',       currency:'INR' },
  { ticker:'SAM2', label:'サウジアラビア', currency:'SAR' },
  { ticker:'IDM2', label:'インドネシア', currency:'IDR' },
  { ticker:'TRM2', label:'トルコ',       currency:'TRY' },
  { ticker:'ZAM2', label:'南アフリカ',   currency:'ZAR' },
  { ticker:'ARM2', label:'アルゼンチン', currency:'ARS' },
];

// TradingViewのM2データはUSD換算済みで提供される前提
// 単位：兆USD = T
const COLORS = [
  '#d97757','#e05252','#6a9bcc','#f5a623','#788c5d',
  '#9b59b6','#1abc9c','#e74c8b','#3498db','#e67e22',
  '#2ecc71','#c0392b','#27ae60','#8e44ad','#f39c12',
  '#16a085','#d35400','#e74c3c','#7f8c8d','#2980b9',
];
const GLOBAL_COLOR = '#d97757';

// ══════════════════════════════════════════════════════════
//  状態
// ══════════════════════════════════════════════════════════
let rawData    = null;   // JSONそのまま
let seriesData = {};     // ticker → [{x: Date, y: number}]
let visibility = {};     // ticker → bool
let topPeriod  = '10y';
let cardPeriod = {};     // ticker → period string
let topChartInst = null;
let cardCharts   = {};   // ticker → Chart instance

// ══════════════════════════════════════════════════════════
//  ユーティリティ
// ══════════════════════════════════════════════════════════
function periodToDate(p) {
  const now = new Date();
  if (p === '1y')  return new Date(now.getFullYear()-1,  now.getMonth(), 1);
  if (p === '5y')  return new Date(now.getFullYear()-5,  now.getMonth(), 1);
  if (p === '10y') return new Date(now.getFullYear()-10, now.getMonth(), 1);
  return new Date('2000-01-01');
}

function formatT(v) {
  if (v == null || isNaN(v)) return '—';
  if (Math.abs(v) >= 1e12) return (v/1e12).toFixed(2) + 'T';
  if (Math.abs(v) >= 1e9)  return (v/1e9).toFixed(1)  + 'B';
  return v.toFixed(0);
}

function formatDate(dateStr) {
  if (!dateStr) return '—';
  const d = new Date(dateStr);
  return d.getFullYear() + '年' +
    String(d.getMonth()+1).padStart(2,'0') + '月';
}

// ══════════════════════════════════════════════════════════
//  データ処理
// ══════════════════════════════════════════════════════════
function processData(json) {
  const series = json.series || {};
  TICKERS_INFO.forEach(info => {
    const raw = series[info.ticker] || [];
    seriesData[info.ticker] = raw.map(([d,v]) => ({
      x: new Date(d), y: v
    })).sort((a,b) => a.x - b.x);
    visibility[info.ticker] = true; // デフォルト全表示
  });

  // Global = 全銘柄合計（同じ日付のみ加算）
  // TradingViewのM2はすでにUSD換算で提供されるため単純合計
  const globalMap = {};
  TICKERS_INFO.forEach(info => {
    seriesData[info.ticker].forEach(pt => {
      const key = pt.x.toISOString().slice(0,7);
      if (!globalMap[key]) globalMap[key] = { x: pt.x, y: 0, cnt: 0 };
      globalMap[key].y   += pt.y;
      globalMap[key].cnt += 1;
    });
  });
  seriesData['GLOBAL'] = Object.values(globalMap)
    .filter(p => p.cnt >= 10) // 主要銘柄が揃っている月のみ
    .map(p => ({ x: p.x, y: p.y }))
    .sort((a,b) => a.x - b.x);
  visibility['GLOBAL'] = true;
}

function filterByPeriod(pts, period) {
  const since = periodToDate(period);
  return pts.filter(p => p.x >= since);
}

// ══════════════════════════════════════════════════════════
//  Chart.js 共通オプション
// ══════════════════════════════════════════════════════════
function baseOptions(showLegend = false) {
  return {
    responsive: true,
    maintainAspectRatio: false,
    animation: { duration: 400 },
    interaction: { mode: 'index', intersect: false },
    plugins: {
      legend: {
        display: showLegend,
        position: 'top',
        labels: {
          font: { family: 'Poppins', size: 11 },
          color: '#141413',
          boxWidth: 10, boxHeight: 10, padding: 12,
          usePointStyle: true, pointStyle: 'circle',
        },
      },
      tooltip: {
        backgroundColor: '#faf9f5',
        borderColor: '#e8e6dc',
        borderWidth: 1,
        titleColor: '#141413',
        bodyColor: '#141413',
        titleFont: { family: 'Poppins', size: 12, weight: '600' },
        bodyFont: { family: 'Lora', size: 12 },
        padding: 10,
        callbacks: {
          label: ctx => {
            const v = ctx.parsed.y;
            return ` ${ctx.dataset.label}: ${formatT(v)} USD`;
          }
        }
      },
    },
    scales: {
      x: {
        type: 'time',
        time: { unit: 'year', tooltipFormat: 'yyyy年MM月' },
        grid: { color: '#e8e6dc', lineWidth: 0.5 },
        ticks: {
          font: { family: 'Poppins', size: 11 },
          color: '#b0aea5', maxTicksLimit: 10,
        },
        border: { color: '#e8e6dc' },
      },
      y: {
        grid: { color: '#e8e6dc', lineWidth: 0.5 },
        ticks: {
          font: { family: 'Poppins', size: 11 },
          color: '#b0aea5',
          callback: v => formatT(v),
        },
        border: { color: '#e8e6dc' },
      },
    },
  };
}

function makeDataset(ticker, label, color, pts) {
  return {
    label,
    data: pts,
    borderColor: color,
    backgroundColor: color + '18',
    borderWidth: 2,
    pointRadius: 0,
    pointHoverRadius: 4,
    fill: false,
    tension: 0.3,
  };
}

// ══════════════════════════════════════════════════════════
//  トップチャート
// ══════════════════════════════════════════════════════════
function buildTopChart() {
  const canvas = document.getElementById('topChart');
  const ctx = canvas.getContext('2d');

  const datasets = [];

  // Global を最前面
  const gPts = filterByPeriod(seriesData['GLOBAL'], topPeriod);
  datasets.push({
    ...makeDataset('GLOBAL', 'Global Total', GLOBAL_COLOR, gPts),
    borderWidth: 2.5,
    borderDash: [5,3],
    order: 0,
  });

  // 各国
  TICKERS_INFO.forEach((info, i) => {
    if (!visibility[info.ticker]) return;
    const pts = filterByPeriod(seriesData[info.ticker], topPeriod);
    datasets.push(makeDataset(info.ticker, info.label, COLORS[i+1], pts));
  });

  const opts = baseOptions(false);
  // カスタムツールチップ：上位N件のみ表示
  opts.plugins.tooltip.filter = item => true;

  if (topChartInst) topChartInst.destroy();
  topChartInst = new Chart(ctx, {
    type: 'line',
    data: { datasets },
    options: opts,
  });
  canvas.style.display = 'block';
}

function updateTopChart() {
  if (!topChartInst) return;
  const gPts = filterByPeriod(seriesData['GLOBAL'], topPeriod);
  topChartInst.data.datasets[0].data = gPts;
  TICKERS_INFO.forEach((info, i) => {
    const ds = topChartInst.data.datasets[i+1];
    if (!ds) return;
    ds.data = filterByPeriod(seriesData[info.ticker], topPeriod);
    ds.hidden = !visibility[info.ticker];
  });
  topChartInst.update();
}

// ══════════════════════════════════════════════════════════
//  表
// ══════════════════════════════════════════════════════════
function buildTable() {
  const tbody = document.getElementById('tableBody');
  tbody.innerHTML = '';

  // Global 行
  const gPts  = seriesData['GLOBAL'];
  const gLast = gPts[gPts.length-1];
  const gPrev = gPts[gPts.length-2];
  const gRow  = makeTableRow(
    'GLOBAL', 'グローバル合計', '', GLOBAL_COLOR,
    gLast?.y, gPrev?.y, gLast?.x
  );
  tbody.appendChild(gRow);

  TICKERS_INFO.forEach((info, i) => {
    const pts  = seriesData[info.ticker];
    const last = pts[pts.length-1];
    const prev = pts[pts.length-2];
    const row  = makeTableRow(
      info.ticker, info.label, info.ticker, COLORS[i+1],
      last?.y, prev?.y, last?.x
    );
    tbody.appendChild(row);
  });

  document.getElementById('tableSection').style.display = 'block';
}

function makeTableRow(ticker, label, tickerBadge, color, latestVal, prevVal, latestDate) {
  const tr = document.createElement('tr');
  tr.dataset.ticker = ticker;
  if (ticker !== 'GLOBAL' && !visibility[ticker]) tr.classList.add('row-hidden');

  const chg      = (latestVal != null && prevVal != null) ? latestVal - prevVal : null;
  const chgPct   = (chg != null && prevVal) ? (chg/prevVal*100) : null;
  const chgClass = chg == null ? '' : chg >= 0 ? 'change-pos' : 'change-neg';
  const chgStr   = chgPct != null
    ? (chg >= 0 ? '+' : '') + chgPct.toFixed(1) + '%'
    : '—';

  const isGlobal = ticker === 'GLOBAL';
  const checked  = isGlobal ? true : visibility[ticker];

  tr.innerHTML = `
    <td>
      <div class="country-cell">
        <div class="dot" style="background:${color}"></div>
        <span>${label}</span>
        ${tickerBadge ? `<span class="ticker-badge">${tickerBadge}</span>` : ''}
      </div>
    </td>
    <td class="val-cell">${formatT(latestVal)}<span class="unit">USD</span></td>
    <td class="val-cell">${formatT(prevVal)}<span class="unit">USD</span></td>
    <td class="date-cell">${formatDate(latestDate?.toISOString?.())}</td>
    <td class="change-cell ${chgClass}">${chgStr}</td>
    <td class="date-cell">月次</td>
    <td class="cb-cell">
      <div class="cb-wrap ${checked ? 'checked' : ''}" data-ticker="${ticker}">
        <svg width="10" height="8" viewBox="0 0 10 8" fill="none">
          <path d="M1 4L3.5 6.5L9 1" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
        </svg>
      </div>
    </td>
  `;

  // チェックボックス イベント
  if (!isGlobal) {
    const cb = tr.querySelector('.cb-wrap');
    cb.addEventListener('click', () => toggleVisibility(ticker));
  }

  return tr;
}

function toggleVisibility(ticker) {
  visibility[ticker] = !visibility[ticker];

  // 表の行スタイル
  const tr = document.querySelector(`tr[data-ticker="${ticker}"]`);
  if (tr) tr.classList.toggle('row-hidden', !visibility[ticker]);

  // チェックボックス
  const cb = document.querySelector(`.cb-wrap[data-ticker="${ticker}"]`);
  if (cb) cb.classList.toggle('checked', visibility[ticker]);

  // トップチャート更新
  updateTopChart();

  // カードチャート表示切り替えは個別チャートなので不要
  const card = document.getElementById('card-' + ticker);
  if (card) card.style.opacity = visibility[ticker] ? '1' : '0.4';
}

// ══════════════════════════════════════════════════════════
//  個別カードチャート
// ══════════════════════════════════════════════════════════
function buildCardsGrid() {
  const grid = document.getElementById('chartsGrid');
  grid.innerHTML = '';

  // Global カードを先頭
  grid.appendChild(makeCard('GLOBAL', 'グローバル合計', '', GLOBAL_COLOR));

  TICKERS_INFO.forEach((info, i) => {
    grid.appendChild(makeCard(info.ticker, info.label, info.ticker, COLORS[i+1]));
  });

  grid.style.display = 'grid';

  // 少し遅延して描画（DOM反映後）
  requestAnimationFrame(() => {
    renderCard('GLOBAL');
    TICKERS_INFO.forEach(info => renderCard(info.ticker));
  });
}

function makeCard(ticker, label, tickerBadge, color) {
  const pts    = seriesData[ticker] || [];
  const last   = pts[pts.length-1];
  const prev   = pts[pts.length-2];
  const chg    = (last && prev) ? ((last.y - prev.y)/prev.y*100) : null;
  const chgStr = chg != null ? (chg>=0?'+':'') + chg.toFixed(1)+'%' : '';
  const chgCls = chg != null ? (chg>=0?'change-pos':'change-neg') : '';

  cardPeriod[ticker] = '10y';

  const div = document.createElement('div');
  div.className = 'chart-card';
  div.id = 'card-' + ticker;
  div.innerHTML = `
    <div class="chart-card-header">
      <div class="chart-card-title">
        <div class="dot" style="background:${color}"></div>
        <div>
          <div class="chart-card-name">${label}</div>
          ${tickerBadge ? `<div class="chart-card-ticker">${tickerBadge} · 月次</div>` : '<div class="chart-card-ticker">月次</div>'}
        </div>
      </div>
      <div class="chart-card-val">
        ${formatT(last?.y)}<span class="unit" style="font-size:10px;color:var(--muted)"> USD</span>
        ${chgStr ? `<br><span class="sub ${chgCls}" style="font-size:11px">${chgStr}</span>` : ''}
      </div>
    </div>
    <div class="period-btns" style="margin-bottom:10px">
      <button class="period-btn" data-p="1y"  data-ticker="${ticker}">1年</button>
      <button class="period-btn" data-p="5y"  data-ticker="${ticker}">5年</button>
      <button class="period-btn active" data-p="10y" data-ticker="${ticker}">10年</button>
      <button class="period-btn" data-p="all" data-ticker="${ticker}">すべて</button>
    </div>
    <div class="card-canvas-wrap">
      <canvas id="canvas-${ticker}"></canvas>
    </div>
  `;

  // 期間ボタン イベント
  div.querySelectorAll('.period-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      div.querySelectorAll('.period-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      cardPeriod[ticker] = btn.dataset.p;
      renderCard(ticker);
    });
  });

  return div;
}

function renderCard(ticker) {
  const canvas = document.getElementById('canvas-' + ticker);
  if (!canvas) return;

  const isGlobal = ticker === 'GLOBAL';
  const color    = isGlobal ? GLOBAL_COLOR
    : COLORS[TICKERS_INFO.findIndex(t => t.ticker === ticker) + 1];
  const label    = isGlobal ? 'グローバル合計'
    : TICKERS_INFO.find(t => t.ticker === ticker)?.label || ticker;

  const period = cardPeriod[ticker] || '10y';
  const pts    = filterByPeriod(seriesData[ticker] || [], period);

  if (cardCharts[ticker]) {
    cardCharts[ticker].destroy();
    delete cardCharts[ticker];
  }

  const opts = baseOptions(false);
  opts.plugins.tooltip.callbacks.label = ctx =>
    ` ${label}: ${formatT(ctx.parsed.y)} USD`;
  opts.scales.x.ticks.maxTicksLimit = 6;
  opts.scales.y.ticks.maxTicksLimit = 5;

  cardCharts[ticker] = new Chart(canvas.getContext('2d'), {
    type: 'line',
    data: {
      datasets: [{
        label,
        data: pts,
        borderColor: color,
        backgroundColor: color + '20',
        borderWidth: 2,
        pointRadius: 0,
        pointHoverRadius: 3,
        fill: true,
        tension: 0.4,
      }]
    },
    options: opts,
  });
}

// ══════════════════════════════════════════════════════════
//  トップ期間ボタン
// ══════════════════════════════════════════════════════════
document.getElementById('topPeriodBtns').addEventListener('click', e => {
  const btn = e.target.closest('.period-btn');
  if (!btn) return;
  document.querySelectorAll('#topPeriodBtns .period-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  topPeriod = btn.dataset.p;
  updateTopChart();
});

// ══════════════════════════════════════════════════════════
//  初期化
// ══════════════════════════════════════════════════════════
async function init() {
  try {
    const resp = await fetch(DATA_URL);
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    rawData = await resp.json();
  } catch (e) {
    // --- デモ用ダミーデータ ---
    rawData = generateDemoData();
  }

  processData(rawData);

  // 最終更新日
  const genAt = rawData?.meta?.generated_at;
  document.getElementById('lastUpdated').textContent =
    genAt
      ? '最終更新: ' + new Date(genAt).toLocaleString('ja-JP', {timeZone:'Asia/Tokyo'}) + ' JST'
      : '最終更新: デモデータ（本番では data_money_supply.json を配置してください）';

  // ローディング非表示
  document.getElementById('topLoading').style.display = 'none';

  buildTopChart();
  buildTable();
  buildCardsGrid();
}

// ══════════════════════════════════════════════════════════
//  デモデータ生成（JSON未配置時のフォールバック）
// ══════════════════════════════════════════════════════════
function generateDemoData() {
  const series = {};
  // ベースライン（兆USD単位の典型値）
  const baselines = {
    CNM2: 3.2e12, USM2: 8.5e12, EUM2: 6.0e12, JPM2: 9.8e12,
    DEM2: 2.2e12, GBM2: 2.8e12, FRM2: 2.0e12, KRM2: 1.5e12,
    ITM2: 1.3e12, CAM2: 1.2e12, RUM2: 0.9e12, BRM2: 0.8e12,
    MXM2: 0.55e12,INM2: 0.9e12, SAM2: 0.6e12, IDM2: 0.5e12,
    TRM2: 0.35e12,ZAM2: 0.25e12,ARM2: 0.18e12,
  };
  const growth = {
    CNM2:0.12, USM2:0.055, EUM2:0.05, JPM2:0.03,
    DEM2:0.04, GBM2:0.05, FRM2:0.04, KRM2:0.07,
    ITM2:0.03, CAM2:0.055,RUM2:0.12, BRM2:0.13,
    MXM2:0.10, INM2:0.12, SAM2:0.06, IDM2:0.12,
    TRM2:0.20, ZAM2:0.10, ARM2:0.40,
  };

  TICKERS_INFO.forEach(info => {
    const records = [];
    const base    = baselines[info.ticker] || 1e12;
    const gr      = growth[info.ticker]   || 0.07;
    const start   = new Date('2008-01-01');
    let val       = base * Math.pow(1/(1+gr), 17); // 2008年時点の値に逆算
    for (let d = new Date(start); d <= new Date(); d.setMonth(d.getMonth()+1)) {
      val *= (1 + gr/12) * (1 + (Math.random()-0.5)*0.005);
      records.push([d.toISOString().slice(0,10), Math.round(val)]);
    }
    series[info.ticker] = records;
  });

  return {
    meta: { generated_at: new Date().toISOString(), source: 'デモデータ' },
    series,
  };
}

init();
</script>
