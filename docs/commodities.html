<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>コモディティ モニター</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&family=Lora:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
<style>
  :root {
    --bg:      #faf9f5;
    --surface: #f0ede6;
    --border:  #e8e6dc;
    --accent:  #d97757;
    --accent2: #6a9bcc;
    --accent3: #788c5d;
    --text:    #141413;
    --muted:   #b0aea5;
    --radius:  10px;
    --shadow:  0 1px 4px rgba(20,20,19,.06);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Lora', Georgia, serif;
    font-size: 14px;
    line-height: 1.6;
  }

  /* ── Header ── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 8px;
    padding: 16px 28px 12px;
    border-bottom: 1px solid var(--border);
  }
  .header-left { display: flex; align-items: baseline; gap: 16px; }
  header h1 {
    font-family: 'Poppins', sans-serif;
    font-size: clamp(1.1rem, 3vw, 1.45rem);
    font-weight: 600;
    letter-spacing: -.01em;
    color: var(--text);
  }
  header h1 em { color: var(--accent); font-style: normal; }
  .breadcrumb { font-size: 12px; color: var(--muted); font-family: 'Poppins', sans-serif; }
  .breadcrumb a { color: var(--accent2); text-decoration: none; }
  .breadcrumb a:hover { text-decoration: underline; }
  #updated { font-size: 11px; color: var(--muted); font-family: 'Poppins', sans-serif; font-weight: 300; }

  /* ── Overview range bar ── */
  .range-bar {
    display: flex;
    gap: 5px;
    padding: 9px 28px;
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
    align-items: center;
  }
  .range-bar label {
    font-size: 10px; color: var(--muted);
    font-family: 'Poppins', sans-serif; font-weight: 500;
    letter-spacing: .07em; text-transform: uppercase; margin-right: 4px;
  }
  .range-btn {
    background: transparent; border: 1px solid var(--border);
    color: var(--muted); font-family: 'Poppins', sans-serif;
    font-size: 11px; font-weight: 500; padding: 3px 12px;
    border-radius: 20px; cursor: pointer; transition: all .15s;
  }
  .range-btn:hover { border-color: var(--accent); color: var(--accent); }
  .range-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

  /* ── Content ── */
  .content { padding: 24px 28px; max-width: 1400px; margin: 0 auto; }
  @media (max-width: 640px) { .content { padding: 16px; } }

  /* ── Overview card ── */
  .overview-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 20px 20px 16px;
    margin-bottom: 28px;
  }
  .overview-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 10px;
    margin-bottom: 14px;
  }
  .overview-header h2 {
    font-family: 'Poppins', sans-serif;
    font-size: .75rem; font-weight: 500;
    text-transform: uppercase; letter-spacing: .07em;
    color: var(--text);
    display: flex; align-items: center; gap: 8px;
  }
  .overview-header h2::before {
    content: ''; display: inline-block;
    width: 8px; height: 8px; border-radius: 2px;
    background: var(--accent); flex-shrink: 0;
  }
  .ticker-toggles { display: flex; flex-wrap: wrap; gap: 6px; }
  .toggle-chip {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 4px 11px; border-radius: 20px;
    border: 1px solid var(--border); background: var(--bg);
    cursor: pointer; user-select: none; transition: all .15s;
    font-family: 'Poppins', sans-serif; font-size: 11px;
    font-weight: 400; color: var(--muted);
  }
  .toggle-chip:hover { border-color: var(--muted); color: var(--text); }
  .toggle-chip.active { color: #fff; border-color: transparent; }
  .toggle-chip .chip-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; opacity: .85; }
  .toggle-chip input { display: none; }
  .overview-chart-wrap { position: relative; width: 100%; height: 280px; }

  /* ── Individual charts grid ── */
  .section-label {
    font-family: 'Poppins', sans-serif;
    font-size: 10px; font-weight: 500;
    text-transform: uppercase; letter-spacing: .09em;
    color: var(--muted); margin-bottom: 12px;
  }
  .charts-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
  }
  @media (max-width: 640px) { .charts-grid { grid-template-columns: 1fr; } }

  /* ── Individual chart card ── */
  .chart-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 14px 16px 12px;
  }
  .chart-card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 8px;
    gap: 8px;
    flex-wrap: wrap;
  }
  .chart-card h3 {
    font-family: 'Poppins', sans-serif;
    font-size: .72rem; font-weight: 500;
    text-transform: uppercase; letter-spacing: .06em;
    color: var(--text);
    display: flex; align-items: center; gap: 7px;
    flex-shrink: 0;
  }
  .chart-card h3 .card-dot {
    width: 8px; height: 8px;
    border-radius: 2px; flex-shrink: 0;
  }
  .card-right {
    display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
  }
  .last-val {
    font-family: 'Poppins', sans-serif;
    font-size: 12px; font-weight: 500;
    color: var(--text);
    white-space: nowrap;
  }

  /* 個別カード内の期間ボタン（小さめ） */
  .card-range-bar {
    display: flex; gap: 3px;
  }
  .card-range-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'Poppins', sans-serif;
    font-size: 10px; font-weight: 500;
    padding: 2px 7px; border-radius: 20px;
    cursor: pointer; transition: all .15s;
    line-height: 1.4;
  }
  .card-range-btn:hover { border-color: var(--accent); color: var(--accent); }
  .card-range-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

  .chart-card .chart-wrap {
    position: relative; width: 100%; height: 150px;
  }

  /* ── Footer ── */
  footer {
    padding: 10px 28px; border-top: 1px solid var(--border);
    font-size: 10.5px; color: var(--muted);
    font-family: 'Poppins', sans-serif; font-weight: 300;
    display: flex; flex-wrap: wrap; gap: 8px; justify-content: space-between;
  }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <h1>Commodity <em>Monitor</em></h1>
    <span class="breadcrumb"><a href="index.html">← Dashboard</a></span>
  </div>
  <span id="updated">読み込み中…</span>
</header>

<div class="range-bar">
  <label>オーバービュー期間</label>
  <button class="range-btn" data-months="6">6M</button>
  <button class="range-btn" data-months="12">1Y</button>
  <button class="range-btn" data-months="36">3Y</button>
  <button class="range-btn" data-months="60">5Y</button>
  <button class="range-btn active" data-months="0">全期間</button>
</div>

<div class="content">

  <!-- ① 全銘柄オーバービュー -->
  <div class="overview-card">
    <div class="overview-header">
      <h2>全銘柄オーバービュー</h2>
      <div class="ticker-toggles" id="ticker-toggles"></div>
    </div>
    <div class="overview-chart-wrap">
      <canvas id="chart-overview"></canvas>
    </div>
  </div>

  <!-- ② 個別グラフ -->
  <div class="section-label">個別チャート</div>
  <div class="charts-grid" id="charts-grid"></div>

</div>

<footer>
  <span>出典：Yahoo Finance（yfinance経由）／ 先物価格（期近）</span>
  <span>免責：本データは参考目的のみ。投資判断の根拠としないでください。</span>
</footer>

<script>
// ── 銘柄定義 ──────────────────────────────────────────
const TICKERS = [
  { name: "原油 (WTI)",   group: "エネルギー" },
  { name: "天然ガス",     group: "エネルギー" },
  { name: "銅",           group: "工業金属" },
  { name: "金",           group: "貴金属" },
  { name: "銀",           group: "貴金属" },
  { name: "プラチナ",     group: "貴金属" },
  { name: "トウモロコシ", group: "農産物" },
  { name: "小麦",         group: "農産物" },
  { name: "大豆",         group: "農産物" },
];

const PALETTE = [
  "#d97757","#c4603e","#e8a882",
  "#6a9bcc","#4a7fae","#92b8de",
  "#788c5d","#5a7243","#9db87c",
];
const COLOR_MAP = Object.fromEntries(TICKERS.map((t, i) => [t.name, PALETTE[i]]));

const RANGE_OPTIONS = [
  { label: "6M", months: 6 },
  { label: "1Y", months: 12 },
  { label: "3Y", months: 36 },
  { label: "5Y", months: 60 },
  { label: "全", months: 0 },
];

// ── 状態 ─────────────────────────────────────────────
let allData        = {};
let overviewChart  = null;
let indivCharts    = {};         // name → Chart
let overviewMonths = 0;
let indivMonths    = {};         // name → months（個別カードごと）
let visibility     = Object.fromEntries(TICKERS.map(t => [t.name, true]));

// ── ユーティリティ ────────────────────────────────────
function filterByRange(series, months) {
  if (!months) return series;
  const cutoff = new Date();
  cutoff.setMonth(cutoff.getMonth() - months);
  return series.filter(([d]) => new Date(d) >= cutoff);
}

function baseOptions() {
  return {
    responsive: true,
    maintainAspectRatio: false,
    interaction: { mode: "index", intersect: false },
    plugins: {
      legend: { display: false },
      tooltip: {
        backgroundColor: "#faf9f5",
        borderColor: "#e8e6dc", borderWidth: 1,
        titleColor: "#b0aea5", bodyColor: "#141413",
        padding: 10,
      },
    },
    scales: {
      x: {
        type: "time",
        time: { tooltipFormat: "yyyy-MM-dd" },
        grid: { color: "#e8e6dc", lineWidth: .7 },
        ticks: {
          color: "#b0aea5",
          font: { family: "'Poppins', sans-serif", size: 10 },
          maxTicksLimit: 7,
        },
      },
      y: {
        grid: { color: "#e8e6dc", lineWidth: .7 },
        ticks: {
          color: "#b0aea5",
          font: { family: "'Poppins', sans-serif", size: 10 },
          maxTicksLimit: 5,
        },
      },
    },
    elements: {
      point: { radius: 0, hoverRadius: 4, hoverBorderWidth: 2, hoverBorderColor: "#fff" },
      line: { tension: 0.2, borderWidth: 1.8 },
    },
  };
}

// ── オーバービュー ─────────────────────────────────────
function buildOverview() {
  const datasets = TICKERS.map(({ name }) => ({
    label: name,
    data: filterByRange(allData[name] || [], overviewMonths).map(([d, v]) => ({ x: d, y: v })),
    borderColor: COLOR_MAP[name],
    backgroundColor: "transparent",
    hidden: !visibility[name],
  }));

  const ctx = document.getElementById("chart-overview").getContext("2d");
  if (overviewChart) overviewChart.destroy();
  overviewChart = new Chart(ctx, { type: "line", data: { datasets }, options: baseOptions() });
}

// ── 個別チャート（1枚更新） ────────────────────────────
function updateIndivChart(name) {
  const months = indivMonths[name];
  const points = filterByRange(allData[name] || [], months).map(([d, v]) => ({ x: d, y: v }));
  const chart  = indivCharts[name];
  if (!chart) return;
  chart.data.datasets[0].data = points;
  chart.update();
}

// ── 個別チャートグリッド構築 ───────────────────────────
function buildIndividual() {
  const grid = document.getElementById("charts-grid");
  grid.innerHTML = "";
  indivCharts = {};

  TICKERS.forEach(({ name }) => {
    const color = COLOR_MAP[name];
    const series = allData[name] || [];
    const last   = series.at(-1);
    indivMonths[name] = 0; // デフォルト：全期間

    // カード
    const card = document.createElement("div");
    card.className = "chart-card";

    // 期間ボタンHTML
    const btnHtml = RANGE_OPTIONS.map(({ label, months }) =>
      `<button class="card-range-btn${months === 0 ? ' active' : ''}" data-months="${months}">${label}</button>`
    ).join("");

    card.innerHTML = `
      <div class="chart-card-header">
        <h3>
          <span class="card-dot" style="background:${color}"></span>
          ${name}
        </h3>
        <div class="card-right">
          <span class="last-val">${last ? Number(last[1]).toLocaleString("ja-JP", { maximumFractionDigits: 2 }) : "—"}</span>
          <div class="card-range-bar">${btnHtml}</div>
        </div>
      </div>
      <div class="chart-wrap"><canvas></canvas></div>
    `;
    grid.appendChild(card);

    // 期間ボタン イベント
    card.querySelectorAll(".card-range-btn").forEach(btn => {
      btn.addEventListener("click", () => {
        card.querySelectorAll(".card-range-btn").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        indivMonths[name] = +btn.dataset.months;
        updateIndivChart(name);
      });
    });

    // チャート描画
    const points = filterByRange(series, 0).map(([d, v]) => ({ x: d, y: v }));
    const ctx    = card.querySelector("canvas").getContext("2d");
    indivCharts[name] = new Chart(ctx, {
      type: "line",
      data: {
        datasets: [{
          label: name,
          data: points,
          borderColor: color,
          backgroundColor: color + "18",
        }],
      },
      options: baseOptions(),
    });
  });
}

// ── チェックチップ ─────────────────────────────────────
function buildToggles() {
  const container = document.getElementById("ticker-toggles");
  container.innerHTML = "";
  TICKERS.forEach(({ name }) => {
    const color = COLOR_MAP[name];
    const chip  = document.createElement("label");
    chip.className = "toggle-chip active";
    chip.style.background  = color;
    chip.style.borderColor = color;
    chip.innerHTML = `
      <input type="checkbox" checked>
      <span class="chip-dot" style="background:#fff"></span>
      ${name}
    `;
    chip.querySelector("input").addEventListener("change", e => {
      visibility[name] = e.target.checked;
      if (visibility[name]) {
        chip.classList.add("active");
        chip.style.background  = color;
        chip.style.borderColor = color;
        chip.querySelector(".chip-dot").style.background = "#fff";
      } else {
        chip.classList.remove("active");
        chip.style.background  = "";
        chip.style.borderColor = "";
        chip.querySelector(".chip-dot").style.background = color;
      }
      if (overviewChart) {
        const ds = overviewChart.data.datasets.find(d => d.label === name);
        if (ds) { ds.hidden = !visibility[name]; overviewChart.update(); }
      }
    });
    container.appendChild(chip);
  });
}

// ── オーバービュー期間ボタン ───────────────────────────
document.querySelectorAll(".range-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".range-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    overviewMonths = +btn.dataset.months;
    buildOverview();
  });
});

// ── 初期化 ────────────────────────────────────────────
async function init() {
  try {
    const res  = await fetch("data_commodities.json");
    const json = await res.json();
    allData = json.data || {};

    const ts = new Date(json.generated_at);
    document.getElementById("updated").textContent =
      "最終更新：" + ts.toLocaleString("ja-JP", { timeZone: "Asia/Tokyo" }) + " JST";

    buildToggles();
    buildOverview();
    buildIndividual();
  } catch (e) {
    document.getElementById("updated").textContent = "データ読み込みエラー";
    console.error(e);
  }
}

init();
</script>
</body>
</html>
