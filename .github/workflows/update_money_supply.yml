name: Update Money Supply

on:
  schedule:
    # 毎週土曜 JST 9:00 = UTC 0:00
    - cron: "0 0 * * 6"
  workflow_dispatch:            # 手動実行

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write           # JSON コミットに必要

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-money-supply-${{ hashFiles('**/requirements*.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-money-supply-

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install pandas
          pip install git+https://github.com/StreamAlpha/tvdatafeed.git

      - name: Fetch money supply data
        env:
          TV_USERNAME: ${{ secrets.TV_USERNAME }}
          TV_PASSWORD: ${{ secrets.TV_PASSWORD }}
        run: |
          python scripts/fetch_money_supply.py

      - name: Commit and push if data changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data_money_supply.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: update money supply data [skip ci]"
            git push
          fi