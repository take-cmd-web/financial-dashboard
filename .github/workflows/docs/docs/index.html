
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Financial Dashboard</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap');

  :root {
    --bg:      #0d0f12;
    --surface: #141720;
    --border:  #222633;
    --accent:  #d4a96a;
    --accent2: #7b9ccc;
    --text:    #e8e6e0;
    --muted:   #6b7280;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
  }

  header { text-align: center; margin-bottom: 48px; }
  header h1 {
    font-family: 'DM Serif Display', Georgia, serif;
    font-size: clamp(1.8rem, 5vw, 2.8rem);
    font-weight: 400;
    color: var(--accent);
    letter-spacing: .03em;
    margin-bottom: 8px;
  }
  header p { color: var(--muted); font-size: 13px; }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 280px));
    gap: 18px;
    justify-content: center;
    width: 100%;
    max-width: 900px;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 24px 22px;
    text-decoration: none;
    color: var(--text);
    transition: border-color .2s, transform .2s;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .card:hover {
    border-color: var(--accent);
    transform: translateY(-3px);
  }

  .card-icon { font-size: 28px; }
  .card-title {
    font-family: 'DM Serif Display', serif;
    font-size: 1.05rem;
    font-weight: 400;
    color: var(--accent);
    letter-spacing: .02em;
  }
  .card-desc { font-size: 12px; color: var(--muted); line-height: 1.5; }
  .card-tag {
    display: inline-block;
    font-size: 10px;
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 2px 8px;
    color: var(--accent2);
    margin-top: 4px;
    width: fit-content;
  }

  footer {
    margin-top: 56px;
    font-size: 11px;
    color: var(--muted);
    text-align: center;
  }
</style>
</head>
<body>

<header>
  <h1>Financial Dashboard</h1>
  <p>毎朝5時（JST）自動更新 ／ Cloudflare Pages + GitHub Actions</p>
</header>

<div class="grid">

  <a class="card" href="commodities.html">
    <div class="card-icon">🛢️</div>
    <div class="card-title">コモディティ</div>
    <div class="card-desc">原油・天然ガス・貴金属・農産物の先物価格推移</div>
    <span class="card-tag">日足 / Yahoo Finance</span>
  </a>

  <!-- 今後追加するカテゴリはここに card を追加 -->

    <div class="card-icon">🏦</div>
    <div class="card-title">政策金利</div>
    <div class="card-desc">主要中銀の政策金利推移</div>
    <span class="card-tag">週足 / TradingView</span>
  </a>

  <a class="card" href="equities.html">
    <div class="card-icon">📈</div>
    <div class="card-title">株価指数</div>
    <div class="card-desc">S&P500・日経・DAX ほか</div>
    <span class="card-tag">日足 / Yahoo Finance</span>
  </a>
  -->

</div>

<footer>
  © take-cmd-web ／ データは参考目的のみ。投資判断の根拠としないでください。
</footer>

</body>
</html>
